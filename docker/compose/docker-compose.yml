name: ttahub

services:

  backend:
    build:
      context: ../..
      dockerfile: ../images/Dockerfile
    entrypoint: ["/workspace/docker/scripts/ensure-deps.sh", "backend"]
    command: ["yarn", "server"]
    env_file:
      - ../../.env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      YARN_CACHE_FOLDER: /yarn-cache
      NEW_RELIC_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/workspace/docker/scripts/healthcheck-http.sh",
          "http://127.0.0.1:8080/api/user",
        ]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "8080:8080"
    volumes:
      - ../../:/workspace:rw
      - backend-node-modules:/workspace/node_modules
      - backend-yarn-cache:/yarn-cache

  frontend:
    build:
      context: ../..
      dockerfile: ../images/Dockerfile
    working_dir: /workspace/frontend
    entrypoint: ["/workspace/docker/scripts/ensure-deps.sh", "frontend"]
    command: ["yarn", "start"]
    env_file:
      - ../../.env
    environment:
      BACKEND_PROXY: http://backend:8080
      YARN_CACHE_FOLDER: /yarn-cache
      NODE_OPTIONS: --no-deprecation
    healthcheck:
      test:
        [
          "CMD",
          "/workspace/docker/scripts/healthcheck-http.sh",
          "http://127.0.0.1:3000",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    stdin_open: true
    volumes:
      - ../../frontend:/workspace/frontend:rw
      - ../../packages:/workspace/packages:rw
      - ../../docker:/workspace/docker:ro
      - frontend-node-modules:/workspace/frontend/node_modules
      - frontend-yarn-cache:/yarn-cache

  db:
    image: postgres:15.12
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-something_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ttasmarthub}
      POSTGRES_HOST: ${POSTGRES_HOST:-localhost}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USERNAME:-postgres} -d ${POSTGRES_DB:-ttasmarthub}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    shm_size: 1g

  redis:
    image: redis:6.2.6
    command:
      ["redis-server", "--requirepass", "${REDIS_PASS:-SUPERSECUREPASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASS:-SUPERSECUREPASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  worker:
    profiles: ["fullstack"]
    build:
      context: ../..
      dockerfile: ../images/Dockerfile
    entrypoint: ["/workspace/docker/scripts/ensure-deps.sh", "backend"]
    command: ["yarn", "start:worker:watch"]
    env_file:
      - ../../.env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      SMTP_HOST: mailpit
      YARN_CACHE_FOLDER: /yarn-cache
      NEW_RELIC_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../:/workspace:rw
      - backend-node-modules:/workspace/node_modules
      - backend-yarn-cache:/yarn-cache


  mailpit:
    profiles: ["fullstack"]
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  testingonly:
    profiles: ["fullstack"]
    build:
      context: ../..
      dockerfile: ../images/Dockerfile
    entrypoint: ["/workspace/docker/scripts/ensure-deps.sh", "backend"]
    command: ["yarn", "tsx", "src/testingOnly.js"]
    env_file:
      - ../../.env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      YARN_CACHE_FOLDER: /yarn-cache
      NEW_RELIC_ENABLED: "false"
    healthcheck:
      test: ["CMD", "/workspace/docker/scripts/healthcheck-http.sh", "http://127.0.0.1:9999/testingOnly"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9999:9999"
    volumes:
      - ../../:/workspace:rw
      - backend-node-modules:/workspace/node_modules
      - backend-yarn-cache:/yarn-cache

  minio:
    profiles: ["fullstack"]
    image: minio/minio:RELEASE.2024-01-01T16-36-33Z
    env_file:
      - ../../.env
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api-docs:
    profiles: ["fullstack"]
    image: redocly/redoc
    environment:
      SPEC_URL: swagger/index.yaml
    ports:
      - "5003:80"
    volumes:
      - ../../docs/openapi:/usr/share/nginx/html/swagger:ro

volumes:
  db-data:
  redis-data:
  minio-data:
  backend-node-modules:
  frontend-node-modules:
  backend-yarn-cache:
  frontend-yarn-cache:
