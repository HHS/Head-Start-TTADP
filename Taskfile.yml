version: "3"

vars:
  PROJECT_NAME: "ttahub"
  COMPOSE_FILE: "docker/compose/docker-compose.yml"
  DEV_DEBUG: '{{default "false" .DEV_DEBUG}}'
  DEFAULT_TARGET: "backend"
  USE_LOCAL_POSTGRES:
    sh: |
      if [[ "$POSTGRES_HOST" == "host.docker.internal" ]]; then
        echo "true"
      else
        echo "false"
      fi
  CMD: ""

tasks:
  default:
    desc: Show available tasks
    aliases: [help]
    cmds:
      - task --list

  # --- Stack Up ---

  stack-up:
    desc: Start basic local dev stack (frontend/backend/db/redis/redis)
    cmds:
      - task: _stack-up-base

  stack-up-full:
    desc: Start full local stack (dev + all extras)
    cmds:
      - task: _stack-up-base
        vars: { STACK: '--profile fullstack' }

  _stack-up-base:
    desc: Internal task to abstract common stack-up steps
    internal: true
    vars:
      STACK: '{{default "" .STACK}}'
    cmds:
      - yarn deps:install
      - cmd: docker compose -f {{.COMPOSE_FILE}} down --remove-orphans
        ignore_error: true
      - |
        echo "Initializing database..."
        docker compose -f {{.COMPOSE_FILE}} up -y --build --detach --wait db redis
        docker/scripts/dev-db-init.sh
      - |
        echo "Starting stack..."
        docker compose -f {{.COMPOSE_FILE}} {{.STACK}} up -y --build --detach --wait --force-recreate --remove-orphans || \
        (echo "--- ERROR ---" && docker compose -f {{.COMPOSE_FILE}} logs -n 10 && docker ps && exit 1)
        docker compose -f {{.COMPOSE_FILE}} logs -n 1
      - cmd: |
          echo "----------------------"
          echo "All services healthy, use 'task stack-logs' (or yarn docker:logs) to tail logs"
          echo "----------------------"
        silent: true
      - cmd: docker ps

  # --- Stack Down ---

  stack-down:
    desc: Stop compose stacks for this repo
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} --profile fullstack down --remove-orphans

  refresh:
    desc: Rebuild frontend and backend code, reinstall deps, restart stack
    cmds: 
      - yarn deps:install
      - task: stack-down
      - yarn build
      - docker compose -f {{.COMPOSE_FILE}} build --no-cache
      - task: stack-up

  reset:
    desc: Remove containers, images, networks, volumes and reinitialize stack
    cmds:
      - task: stack-down
      - docker compose -f {{.COMPOSE_FILE}} down --volumes --rmi all --remove-orphans

  # --- Utility ---

  stack-logs:
    desc: Tail current running stack logs
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} logs --follow
    ignore_error: true

  stack-shell:
    desc: Open shell in a running container (TARGET defaults to backend)
    vars:
      TARGET: '{{default "backend" .TARGET}}'
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec {{.TARGET}} /bin/bash
    ignore_error: true

  stack-exec:
    desc: Execute command in running container (TARGET defaults to backend)
    vars:
      TARGET: '{{default {.DEFAULT_TARGET} .TARGET}}'
    cmds:
      - |
        bash -lc "set -euo pipefail; \
          if [ -n '{{.CLI_ARGS}}' ]; then \
            echo '[{{.TARGET}}]: {{.CLI_ARGS}}'; \
            docker compose -f {{.COMPOSE_FILE}} exec {{.TARGET}} {{.CLI_ARGS}}; \
          elif [ -n '{{.CMD}}' ]; then \
            echo '[{{.TARGET}}]: {{.CMD}}'; \
            docker compose -f {{.COMPOSE_FILE}} exec {{.TARGET}} {{.CMD}}; \
          else \
            echo 'Provide a command via -- <cmd> or CMD=<cmd>' >&2; \
            exit 1; \
          fi"

  stack-run:
    desc: Run one-off command in new container (TARGET defaults to backend)
    cmds:
      - |
        bash -lc "set -euo pipefail; \
          if [ -n '{{.CLI_ARGS}}' ]; then \
            echo '[{{.TARGET}}]: {{.CLI_ARGS}}'; \
            docker compose -f {{.COMPOSE_FILE}} run --rm {{.TARGET}} {{.CLI_ARGS}}; \
          elif [ -n '{{.CMD}}' ]; then \
            echo '[{{.TARGET}}]: {{.CMD}}'; \
            docker compose -f {{.COMPOSE_FILE}} run --rm {{.TARGET}} {{.CMD}}; \
          else \
            echo 'Provide a command via -- <cmd> or CMD=<cmd>' >&2; \
            exit 1; \
          fi"

  # --- Internal ---

  msg:
    desc: Internal task to print messages in a consistent format
    internal: true
    vars:
      MSG: ''
    cmds:
      - echo "----- {{.MSG}}"
    silent: true
