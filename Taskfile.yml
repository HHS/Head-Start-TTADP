version: "3"

vars:
  PROJECT_NAME: "ttahub"
  COMPOSE_FILE: "-f docker/compose/docker-compose.yml"
  DEV_DEBUG: '{{default "false" .DEV_DEBUG}}'
  USE_LOCAL_POSTGRES:
    sh: |
      if [[ "$POSTGRES_HOST" == "host.docker.internal" ]]; then
        echo "true"
      else
        echo "false"
      fi
  CMD: ""
  STACK_COMPOSE_FILE: "docker/compose/docker-compose.yml"

tasks:
  default:
    desc: Show available tasks
    aliases: [help]
    cmds:
      - task --list

  # --- Stack Up/Down ---

  stack-up:
    desc: Start basic local dev stack (frontend/backend/db/redis/redis)
    cmds:
      - task: _stack-up-base

  stack-up-full:
    desc: Start full local stack (dev + all extras)
    cmds:
      - task: _stack-up-base
        vars: { STACK: '--profile fullstack' }

  _stack-up-base:
    desc: Internal task to abstract common stack-up steps
    internal: true
    vars:
      STACK: '{{default "" .STACK}}'
    cmds:
      - yarn deps:install
      - |
        echo "Initializing database..."
        docker compose {{.COMPOSE_FILE}} up -y --build -y --detach --wait db redis
        docker/scripts/dev-db-init.sh
      - |
        echo "Starting stack..."
        docker compose {{.COMPOSE_FILE}} {{.STACK}} up -y --detach --wait --remove-orphans
        echo "-----------------------------------"
        echo "All services healthy, using 'task stack-logs' to tail logs"
        echo "-----------------------------------"
      - task: stack-logs
      - cmd: docker ps


  stack-down:
    desc: Stop compose stacks for this repo
    cmds:
      - docker compose {{.COMPOSE_FILE}} down --remove-orphans

  # --- Utility ---

  stack-logs:
    desc: Tail current running stack logs
    cmds:
      - docker compose {{.COMPOSE_FILE}} logs --follow
    ignore_error: true

  stack-shell:
    desc: Open shell in a running container (TARGET defaults to backend)
    vars:
      TARGET: '{{default "backend" .TARGET}}'
    cmds:
      - docker compose {{.COMPOSE_FILE}} exec {{.TARGET}} /bin/bash

  stack-exec:
    desc: Execute command in running container (TARGET defaults to backend)
    cmds:
      - |
        bash -lc "set -euo pipefail; \
          if [ -n '{{.CLI_ARGS}}' ]; then \
            echo '[{{.TARGET}}]: {{.CLI_ARGS}}'; \
            docker compose -f {{.STACK_COMPOSE_FILE}} exec {{.TARGET}} {{.CLI_ARGS}}; \
          elif [ -n '{{.CMD}}' ]; then \
            echo '[{{.TARGET}}]: {{.CMD}}'; \
            docker compose -f {{.STACK_COMPOSE_FILE}} exec {{.TARGET}} {{.CMD}}; \
          else \
            echo 'Provide a command via -- <cmd> or CMD=<cmd>' >&2; \
            exit 1; \
          fi"

  stack-run:
    desc: Run one-off command in new container (TARGET defaults to backend)
    cmds:
      - |
        bash -lc "set -euo pipefail; \
          if [ -n '{{.CLI_ARGS}}' ]; then \
            echo '[{{.TARGET}}]: {{.CLI_ARGS}}'; \
            docker compose -f {{.STACK_COMPOSE_FILE}} run --rm {{.TARGET}} {{.CLI_ARGS}}; \
          elif [ -n '{{.CMD}}' ]; then \
            echo '[{{.TARGET}}]: {{.CMD}}'; \
            docker compose -f {{.STACK_COMPOSE_FILE}} run --rm {{.TARGET}} {{.CMD}}; \
          else \
            echo 'Provide a command via -- <cmd> or CMD=<cmd>' >&2; \
            exit 1; \
          fi"

  refresh:
    desc: Rebuild frontend and backend code, reinstall deps, restart stack
    cmds: 
      - yarn deps:install
      - task: stack-down
      - docker compose {{.COMPOSE_FILE}} build --no-cache

  reset:
    desc: Remove containers, images, networks, volumes and reinitialize stack
    cmds:
      - task: stack-down
      - docker compose {{.COMPOSE_FILE}} down --volumes
      - docker images -a | grep '{{.PROJECT_NAME}}' | awk '{print $2}' | xargs docker rmi
