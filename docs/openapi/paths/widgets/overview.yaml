get:
  tags:
    - widgets
  operationId: overview
  description: Gets widget data for the overview widget
  responses:
    200:
      description: widget data for the overview widget
      content:
        application/json:
          schema:
            type: object
            properties:
              numReports: 
                type: string
              numGrants: 
                type: string
              numTotalGrants:
                type: string
              numOtherEntities:
                type: string
              numParticipants:
                type: string
              numParticipantsRaw:
                type: integer
                description: |
                  Raw (unformatted) participant count. Used by composite
                  widgets such as ttaHistoryOverview to combine AR + TR
                  participants without re-parsing the formatted string.
              sumDuration:
                type: string
