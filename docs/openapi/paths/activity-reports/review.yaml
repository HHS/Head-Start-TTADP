put:
  tags:
    - activity-reports
  summary: Review an activity report
  description: >
    An approving manager reviews an activity report to determine if it requires
    any additional updates. If the report needs updates the manager sets the status to
    'Needs Action', otherwise to 'Approved'
  requestBody:
    description: The status, manager notes, and (for approved reviews) the approver's IANA timezone
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - status
          properties:
            status:
              type: string
              description: The status of the approval
              enum:
                - approved
                - needs_action
            note:
              type: string
              description: Manager feedback relating to the approval
            approvedAtTimezone:
              type: string
              description: IANA timezone for the approval timestamp; required when status is approved
          oneOf:
            - properties:
                status:
                  enum:
                    - approved
              required:
                - approvedAtTimezone
            - properties:
                status:
                  enum:
                    - needs_action
  parameters:
    - in: path
      name: activityReportId
      required: true
      schema:
        type: number
  responses:
    200:
      description: The new activity report approval
      content:
        application/json:
          schema:
            $ref: '../../index.yaml#/components/schemas/approver'
    400:
      description: activityReportId param is missing or malformed, or request body is malformed
